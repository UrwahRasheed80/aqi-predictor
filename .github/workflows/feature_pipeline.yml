name: Feature Pipeline - Hourly

on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0
  workflow_dispatch:       # allow manual run

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run feature pipeline
        env:
          AQICN_API_KEY: ${{ secrets.60038d98bed53177c5f7ea975cfa098d51faec62 }}
          HOPSWORKS_API_KEY: ${{ secrets.1VSOfV8KnLj4veo8.3BGkPgd7gSdb4N153NfOWbQlqXag7PdnAyz6Smm66iX90NuiugH5IamzQS390jsN }}
          HOPSWORKS_PROJECT_NAME: ${{ secrets.aqi_project1 }}
        run: python src/feature_pipeline.py